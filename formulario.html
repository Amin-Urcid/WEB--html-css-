<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Moderno</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body{
    background: linear-gradient(135deg, rgb(236,231,209), rgb(219,206,165));
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.contenedor{
    background:white;
    width:350px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.contenedor h2{
    text-align:center;
    margin-bottom:25px;
    color:rgb(138,118,80);
}

.campo{
    margin-bottom:18px;
}

.campo label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    color:rgb(138,118,80);
    font-weight:600;
}

.campo input{
    width:100%;
    padding:10px;
    border:2px solid rgb(142,151,125);
    border-radius:6px;
    outline:none;
    transition:0.3s;
    font-size:14px;
}

.campo input:focus{
    border-color:rgb(138,118,80);
    box-shadow:0 0 5px rgba(138,118,80,0.3);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:rgb(142,151,125);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:rgb(138,118,80);
    transform:translateY(-2px);
    box-shadow:0 6px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="contenedor">

<h2>Registro</h2>

<form>

<div class="campo">
<label>Nombre</label>
<input type="text" required>
</div>

<div class="campo">
<label>Apellido</label>
<input type="text" required>
</div>

<div class="campo">
<label>Email</label>
<input type="email" required>
</div>

<div class="campo">
<label>Teléfono</label>
<input type="tel" required>
</div>

<button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
