<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Usuario</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: rgb(236, 231, 209);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.formulario{
    background-color: rgb(219, 206, 165);
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

.formulario h2{
    text-align: center;
    color: rgb(138, 118, 80);
    margin-bottom: 20px;
}

label{
    display: block;
    margin-top: 10px;
    color: rgb(138, 118, 80);
    font-weight: bold;
}

input{
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border: 1px solid rgb(142, 151, 125);
    border-radius: 5px;
    box-sizing: border-box;
}

button{
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background-color: rgb(142, 151, 125);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover{
    background-color: rgb(138, 118, 80);
}

</style>
</head>

<body>

<div class="formulario">
    <h2>Registro de Usuario</h2>

    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" required>

        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
